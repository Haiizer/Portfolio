<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Mon Portfolio</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Portfolio"/>
<meta name="theme-color" content="#080808"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080808;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:100%;padding-bottom:30px}
.header{padding:52px 20px 0;border-bottom:1px solid #1a1a1a;background:#080808;position:sticky;top:0;z-index:10}
.hero-label{font-size:.62rem;color:#555;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px}
.hero-value{font-size:2.3rem;font-weight:800;color:#fff;line-height:1.1;letter-spacing:-1px}
.hero-badge{display:inline-flex;align-items:center;gap:4px;background:#0d2b1a;border-radius:20px;padding:4px 12px;margin-top:8px}
.hero-badge span{color:#00e676;font-size:.8rem;font-weight:700}
.meta-row{display:flex;gap:8px;margin-top:14px;padding-bottom:16px}
.meta-card{flex:1;background:#111;border-radius:10px;padding:10px 12px}
.meta-label{font-size:.58rem;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.meta-value{font-size:.9rem;font-weight:700;color:#ccc}
.meta-value.green{color:#00e676}
.tabs{display:flex;padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 14px;font-size:.7rem;font-weight:400;color:#555;border:none;background:none;border-bottom:2px solid #1a1a1a;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.active{color:#00e676;font-weight:700;border-bottom-color:#00e676}
.section{padding:20px 20px 0}
.section-title{font-size:.6rem;color:#555;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.card{background:#111;border-radius:14px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:background .15s}
.card:active{background:#161616}
.card-inner{padding:14px 16px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.card-name{font-size:.88rem;font-weight:600;color:#fff}
.card-tag{font-size:.56rem;text-transform:uppercase;letter-spacing:.5px;border-radius:4px;padding:2px 7px;margin-top:4px;display:inline-block}
.card-tag.active{color:#00e676;background:#0d2b1a}
.card-tag.inactive{color:#555;background:#1a1a1a}
.card-tag.savings{color:#a78bfa;background:#1a102b}
.card-tag.pee{color:#a78bfa;background:#1a102b}
.card-tag.pereco{color:#c4b5fd;background:#160d26}
.card-tag.safe{color:#ff9800;background:#2b1e0d}
.card-right{text-align:right}
.card-value{font-size:1rem;font-weight:800;color:#fff}
.card-perf{font-size:.7rem;font-weight:600;margin-top:2px}
.card-perf.up{color:#00e676}
.card-perf.neutral{color:#888}
.card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid #1a1a1a}
.gain-text{font-size:.72rem}
.gain-text.up{color:#00e676}
.gain-text.neutral{color:#888}
.monthly-badge{font-size:.68rem;color:#555;background:#1a1a1a;border-radius:6px;padding:3px 8px}
.monthly-badge.on{color:#00e676;background:#0d2b1a}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.modal{background:#141414;border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;max-width:480px;border-top:1px solid #222}
.modal-handle{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:1rem;font-weight:700;color:#fff;margin-bottom:4px}
.modal-sub{font-size:.72rem;color:#555;margin-bottom:22px}
.modal-field{margin-bottom:14px}
.modal-field label{font-size:.63rem;color:#888;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:7px}
.modal-field input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:12px;color:#fff;font-size:1.1rem;padding:12px 16px;outline:none;transition:border-color .15s}
.modal-field input:focus{border-color:#00e676}
.modal-hint{font-size:.63rem;color:#444;margin-top:5px}
.modal-actions{display:flex;gap:10px;margin-top:10px}
.btn-save{flex:1;background:#00e676;color:#000;font-weight:700;border:none;border-radius:12px;padding:14px;cursor:pointer;font-size:.9rem}
.btn-close{background:#1a1a1a;color:#888;border:none;border-radius:12px;padding:14px 20px;cursor:pointer;font-size:.9rem}
.proj-card{background:#111;border-radius:14px;padding:16px;margin-bottom:10px}
.proj-card.pessimiste{border-left:3px solid #ff9800}
.proj-card.realiste{border-left:3px solid #00bcd4}
.proj-card.optimiste{border-left:3px solid #00e676}
.proj-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.proj-label{font-weight:700;color:#fff;font-size:.88rem}
.proj-total{font-weight:800;font-size:1.2rem}
.proj-total.pessimiste{color:#ff9800}
.proj-total.realiste{color:#00bcd4}
.proj-total.optimiste{color:#00e676}
.proj-line{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #1a1a1a}
.proj-line span:first-child{font-size:.7rem;color:#888}
.proj-line span:last-child{font-size:.7rem;color:#ccc;font-weight:600}
.perf-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #111}
.perf-row span:first-child{font-size:.78rem;color:#aaa}
.info-box{border-radius:12px;padding:12px 16px;margin-top:10px;font-size:.7rem;line-height:1.6}
.info-box.green{background:#0d2b1a;color:#00e676}
.info-box.orange{background:#2b1a0d;color:#ff9800}
.info-box.purple{background:#1a102b;color:#a78bfa}
.progress-bar{height:4px;background:#1a1a1a;border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s ease}
.monthly-card{background:#111;border-radius:14px;padding:16px}
.monthly-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a}
.monthly-row:last-child{border-bottom:none}
.toast{position:fixed;top:60px;right:16px;background:#00e676;color:#000;font-weight:700;font-size:.7rem;padding:8px 14px;border-radius:20px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast">✓ Sauvegardé</div>
<script>
// ── Données par défaut (mises à jour depuis les captures du 15/06/2026) ──
const DEFAULT = {
  cto:[
    {id:"nasdaq",    name:"NASDAQ100 USD",   tag:"Moteur principal",      tagType:"active",  value:1499.09, invested:1283.33, monthly:120, active:true,  hasPnl:true},
    {id:"semis",     name:"MSCI Semis ESG",  tag:"Conviction sectorielle",tagType:"active",  value:1202.18, invested:651.02,  monthly:30,  active:true,  hasPnl:true},
    {id:"ai",        name:"AI & Big Data",   tag:"À l'abandon",           tagType:"inactive",value:496.65,  invested:324.50,  monthly:0,   active:false, hasPnl:true},
    {id:"world_cto", name:"Core MSCI World", tag:"À l'abandon",           tagType:"inactive",value:387.50,  invested:324.87,  monthly:0,   active:false, hasPnl:true},
    {id:"sp500",     name:"Core S&P 500",    tag:"À l'abandon",           tagType:"inactive",value:379.48,  invested:325.10,  monthly:0,   active:false, hasPnl:true},
  ],
  pea:[
    {id:"world_pea", name:"MSCI World Swap PEA",tag:"Bouclier fiscal",   tagType:"active",  value:302.18,  invested:281.00,  monthly:50,  active:true,  hasPnl:true},
    {id:"tr_epargne", name:"Compte Épargne TR", tag:"Rémunéré ~3%",         tagType:"safe",    value:0,       invested:0,       monthly:0,   active:true,  hasPnl:false},
  ],
  amundi:[
    {id:"pee",       name:"Actions Thales",  tag:"PEE",                   tagType:"pee",     value:0,       invested:0,       monthly:0,   active:true,  hasPnl:true},
    {id:"pereco",    name:"Actions Euromonde",tag:"PERECO",               tagType:"pereco",  value:0,       invested:0,       monthly:0,   active:true,  hasPnl:true},
  ],
  ca:[
    {id:"livretj",   name:"Livret Jeune",    tag:"Épargne liquide",       tagType:"safe",    value:0,       invested:0,       monthly:0,   active:true,  hasPnl:false},
    {id:"livreta",   name:"Livret A",        tag:"Épargne liquide",       tagType:"safe",    value:0,       invested:0,       monthly:0,   active:true,  hasPnl:false},
    {id:"ca_epargne",  name:"Compte Épargne CA", tag:"Épargne liquide",      tagType:"safe",    value:0,       invested:0,       monthly:0,   active:true,  hasPnl:false},
  ],
  lastUpdated: "15/06/2026",
};

let data = JSON.parse(localStorage.getItem("henzo_v4")||"null") || DEFAULT;
let tab = "dashboard";
let modal = null;

const fmt = n => n.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
const fmtPct = n => (n>=0?"+":"")+n.toFixed(2)+" %";
const pct = (v,i) => i>0?((v-i)/i)*100:0;
const all = () => [...data.cto,...data.pea,...data.amundi,...data.ca];
const TV = () => all().reduce((s,i)=>s+i.value,0);
const TI = () => all().reduce((s,i)=>s+i.invested,0);
const MT = () => all().filter(i=>i.monthly>0).reduce((s,i)=>s+i.monthly,0);
const secTotal = s => data[s].reduce((a,i)=>a+i.value,0);

function save(){
  data.lastUpdated = new Date().toLocaleDateString("fr-FR");
  localStorage.setItem("henzo_v4",JSON.stringify(data));
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

function project(pv,pmt,rate,yrs){
  const r=rate/100/12,n=yrs*12;
  return pv*Math.pow(1+r,n)+pmt*(Math.pow(1+r,n)-1)/r;
}

function renderCard(section,item){
  const p = item.hasPnl ? pct(item.value,item.invested) : null;
  const gain = item.value - item.invested;
  const perfHtml = p!==null
    ? `<div class="card-perf ${p>=0?'up':'neutral'}">${fmtPct(p)}</div>`
    : `<div class="card-perf neutral">Taux réglementé</div>`;
  const gainHtml = p!==null && item.value>0
    ? `<span class="gain-text ${gain>=0?'up':'neutral'}">${gain>=0?"▲":"▼"} ${fmt(Math.abs(gain))}</span>`
    : `<span class="gain-text neutral">À renseigner</span>`;
  const monHtml = item.monthly>0
    ? `<span class="monthly-badge on">+${item.monthly}€/mois</span>`
    : `<span class="monthly-badge">Pas de DCA</span>`;
  return `
  <div class="card" onclick="openModal('${section}','${item.id}')">
    <div class="card-inner">
      <div class="card-top">
        <div>
          <div class="card-name">${item.name}</div>
          <span class="card-tag ${item.tagType}">${item.tag}</span>
        </div>
        <div class="card-right">
          <div class="card-value">${item.value>0?fmt(item.value):"— €"}</div>
          ${perfHtml}
        </div>
      </div>
      <div class="card-bottom">${gainHtml}${monHtml}</div>
    </div>
  </div>`;
}

function renderModal(){
  if(!modal) return "";
  const item = data[modal.section].find(i=>i.id===modal.id);
  if(!item) return "";
  return `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${item.name}</div>
      <div class="modal-sub">Appuie sur un champ et saisis la valeur</div>
      <div class="modal-field">
        <label>Valeur actuelle (€)</label>
        <input type="number" id="m-value" value="${item.value||''}" step="0.01" placeholder="Ex: 1499.09"/>
        <div class="modal-hint">Valeur affichée sur Trade Republic / Amundi / CA</div>
      </div>
      <div class="modal-field">
        <label>Total investi (€)</label>
        <input type="number" id="m-invested" value="${item.invested||''}" step="0.01" placeholder="Ex: 1283.33"/>
        <div class="modal-hint">Somme totale que tu as réellement versée</div>
      </div>
      <div class="modal-field">
        <label>Versement mensuel (€)</label>
        <input type="number" id="m-monthly" value="${item.monthly||''}" step="1" placeholder="0"/>
        <div class="modal-hint">Montant du plan d'épargne automatique</div>
      </div>
      <div class="modal-actions">
        <button class="btn-close" onclick="closeModal()">Annuler</button>
        <button class="btn-save" onclick="saveModal('${modal.section}','${modal.id}')">Enregistrer</button>
      </div>
    </div>
  </div>`;
}

function openModal(s,id){ modal={section:s,id}; render(); setTimeout(()=>document.getElementById("m-value")?.focus(),50); }
function closeModal(){ modal=null; render(); }
function saveModal(s,id){
  const v=parseFloat(document.getElementById("m-value").value)||0;
  const inv=parseFloat(document.getElementById("m-invested").value)||0;
  const mon=parseFloat(document.getElementById("m-monthly").value)||0;
  data[s]=data[s].map(i=>i.id===id?{...i,value:v,invested:inv,monthly:mon}:i);
  modal=null; save(); render();
}

function render(){
  const tv=TV(),ti=TI(),tg=tv-ti,tp=pct(tv,ti),mt=MT();
  let content="";
  const sections=[
    {key:"cto",   label:"CTO",              color:"#00e676"},
    {key:"pea",   label:"PEA",              color:"#00bcd4"},
    {key:"amundi",label:"Amundi (Thales)",  color:"#a78bfa"},
    {key:"ca",    label:"Crédit Agricole",  color:"#ff9800"},
  ];

  if(tab==="dashboard"){
    const active=all().filter(i=>i.monthly>0);
    const investable=[...data.cto,...data.pea].filter(i=>i.value>0);
    content=`<div class="section">
      <div class="section-title">Répartition</div>
      ${sections.map(s=>{
        const sv=secTotal(s.key);
        const sp=tv>0?((sv/tv)*100).toFixed(0):0;
        return `<div style="background:#111;border-radius:14px;padding:14px;margin-bottom:8px;border-left:3px solid ${s.color}">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:.63rem;color:#555;text-transform:uppercase;letter-spacing:1px">${s.label}</div>
              <div style="font-size:1rem;font-weight:800;color:#fff;margin-top:2px">${sv>0?fmt(sv):"À renseigner"}</div>
            </div>
            <div style="font-size:1.4rem;font-weight:800;color:${s.color}">${sv>0?sp+"%":"—"}</div>
          </div>
          ${sv>0?`<div class="progress-bar"><div class="progress-fill" style="width:${sp}%;background:${s.color}"></div></div>`:""}
        </div>`;
      }).join("")}
      <div class="section-title" style="margin-top:20px">DCA mensuel</div>
      <div class="monthly-card">
        ${active.length>0?active.map(i=>`
          <div class="monthly-row">
            <span style="font-size:.8rem;color:#ccc">${i.name}</span>
            <span style="font-size:.82rem;font-weight:700;color:#00e676">+${i.monthly}€</span>
          </div>`).join(""):`<div style="font-size:.78rem;color:#555;padding:8px 0">Aucun versement automatique configuré</div>`}
        <div style="display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid #333;margin-top:4px">
          <span style="font-size:.85rem;font-weight:700;color:#fff">Total mensuel</span>
          <span style="font-size:1rem;font-weight:800;color:#fff">${mt}€</span>
        </div>
      </div>
      ${investable.length>0?`
      <div class="section-title" style="margin-top:20px">Performance</div>
      ${investable.map(i=>{
        const p=pct(i.value,i.invested);
        const col=p>50?"#00e676":p>20?"#69d490":p>0?"#aaa":"#ff5252";
        return `<div class="perf-row"><span>${i.name}</span><span style="font-size:.8rem;font-weight:700;color:${col}">${fmtPct(p)}</span></div>`;
      }).join("")}`:""}
    </div>`;

  } else if(tab==="cto"){
    content=`<div class="section">
      <div class="section-title">Compte-Titres · ${fmt(secTotal("cto"))}</div>
      <div class="info-box green" style="margin-bottom:12px">Appuie sur une ligne pour mettre à jour valeur, capital investi et DCA mensuel.</div>
      ${data.cto.map(i=>renderCard("cto",i)).join("")}
    </div>`;

  } else if(tab==="pea"){
    content=`<div class="section">
      <div class="section-title">PEA & Épargne TR · ${fmt(secTotal("pea"))}</div>
      ${data.pea.map(i=>renderCard("pea",i)).join("")}
      <div class="info-box green">💡 PEA : objectif 200€/mois · Fiscalité 17,2% après 5 ans · Libre déc. 2030 · Compte Épargne TR : ~3% brut rémunéré</div>
    </div>`;

  } else if(tab==="amundi"){
    content=`<div class="section">
      <div class="section-title">Épargne Salariale Thales · ${fmt(secTotal("amundi"))}</div>
      ${data.amundi.map(i=>renderCard("amundi",i)).join("")}
      <div class="info-box purple">💜 PEE = déblocable après 5 ans ou événement (mariage, CDI…) · PERECO = retraite · Abondement Thales ~352€/an · Mets à jour après chaque relevé Amundi</div>
    </div>`;

  } else if(tab==="ca"){
    content=`<div class="section">
      <div class="section-title">Crédit Agricole · ${fmt(secTotal("ca"))}</div>
      ${data.ca.map(i=>renderCard("ca",i)).join("")}
      <div class="info-box orange">🏦 Livret Jeune : 3% · max 1 600€ · jusqu'à 25 ans · Livret A : 2,4% · Compte Épargne CA : taux variable · Capital garanti</div>
    </div>`;

  } else if(tab==="projections"){
    content=`<div class="section" id="proj-section">${renderProjections()}</div>`;
  }

  document.getElementById("app").innerHTML=`
    <div class="header">
      <div class="hero-label">Patrimoine total</div>
      <div class="hero-value">${fmt(tv)}</div>
      <div class="hero-badge"><span>▲ ${fmtPct(tp)} · +${fmt(tg)}</span></div>
      <div class="meta-row">
        <div class="meta-card"><div class="meta-label">Investi</div><div class="meta-value">${fmt(ti)}</div></div>
        <div class="meta-card"><div class="meta-label">DCA/mois</div><div class="meta-value green">${mt}€</div></div>
        <div class="meta-card"><div class="meta-label">Màj</div><div class="meta-value" style="font-size:.72rem">${data.lastUpdated}</div></div>
      </div>
      <div class="tabs">
        <button class="tab ${tab==="dashboard"?"active":""}" onclick="setTab('dashboard')">Aperçu</button>
        <button class="tab ${tab==="cto"?"active":""}" onclick="setTab('cto')">CTO</button>
        <button class="tab ${tab==="pea"?"active":""}" onclick="setTab('pea')">PEA & Épargne</button>
        <button class="tab ${tab==="amundi"?"active":""}" onclick="setTab('amundi')">Amundi</button>
        <button class="tab ${tab==="ca"?"active":""}" onclick="setTab('ca')">Livrets</button>
        <button class="tab ${tab==="projections"?"active":""}" onclick="setTab('projections')">Projections</button>
      </div>
    </div>
    ${content}
    ${renderModal()}`;
}

function setTab(t){tab=t;modal=null;render()}

// ── Projections dynamiques ──
let projYear = 20;

function updateProj(val){
  projYear = parseInt(val);
  const el = document.getElementById("proj-section");
  if(el) el.innerHTML = renderProjections();
}

function calcTotal(yrs, rates){
  // Tous les ETF CTO avec leurs taux selon scénario
  const positions = [
    {id:"nasdaq",    r:rates.tech, tax:0.30},
    {id:"semis",     r:rates.tech, tax:0.30},
    {id:"ai",        r:rates.tech, tax:0.30},
    {id:"world_cto", r:rates.world,tax:0.30},
    {id:"sp500",     r:rates.world,tax:0.30},
    {id:"world_pea", r:rates.pea,  tax:0.172},
  ];
  let net=0, inv=0;
  positions.forEach(pos=>{
    const item=[...data.cto,...data.pea].find(i=>i.id===pos.id);
    if(!item||item.value<=0) return;
    const pmt=item.monthly||0;
    const gross=project(item.value,pmt,pos.r,yrs);
    const invested=item.value+pmt*yrs*12;
    net += gross-(gross-invested)*pos.tax;
    inv += invested;
  });
  return {net, inv};
}

function renderProjections(){
  const yrs = projYear;
  const scenarios=[
    {key:"pessimiste",label:"Pessimiste",emoji:"🐢",color:"#ff9800",rates:{tech:6,  world:5, pea:5}},
    {key:"realiste",  label:"Réaliste",  emoji:"📈",color:"#00bcd4",rates:{tech:12, world:9, pea:8}},
    {key:"optimiste", label:"Optimiste", emoji:"🚀",color:"#00e676",rates:{tech:15, world:11,pea:10}},
  ];

  const results = scenarios.map(sc=>({sc, ...calcTotal(yrs, sc.rates)}));

  // Barre de progression relative au max optimiste
  const maxNet = results[2].net;

  // Sparkline CSS — points de la courbe réaliste sur 5 jalons
  const milestones=[0,Math.round(yrs*0.25),Math.round(yrs*0.5),Math.round(yrs*0.75),yrs];
  const pts = milestones.map(y=>calcTotal(Math.max(y,0.01),scenarios[1].rates).net);

  // Total investi avec tous les ETF
  const allItems=[...data.cto,...data.pea].filter(i=>i.value>0);
  const totalVerse=allItems.reduce((s,i)=>s+i.value+i.monthly*yrs*12,0);

  const fk = v => v>=1000 ? Math.round(v/1000)+'k' : Math.round(v)+'';

  return `
    <div class="section-title">Projections — dans <span style="color:#00e676">${yrs} an${yrs>1?'s':''}</span></div>

    <div style="background:#111;border-radius:14px;padding:16px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:.65rem;color:#555;text-transform:uppercase;letter-spacing:1px">Horizon de projection</span>
        <span style="font-size:1.2rem;font-weight:800;color:#00e676">${yrs} ans</span>
      </div>
      <input type="range" min="1" max="30" value="${yrs}" step="1"
        style="width:100%;accent-color:#00e676;cursor:pointer;height:4px"
        oninput="updateProj(this.value)" />
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <span style="font-size:.6rem;color:#333">1 an</span>
        <span style="font-size:.6rem;color:#333">30 ans</span>
      </div>
    </div>

    <div style="background:#111;border-radius:14px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:.72rem;color:#888">Tous ETF inclus · Total versé sur ${yrs} an${yrs>1?'s':''}</span>
      <span style="font-size:.9rem;font-weight:700;color:#ccc">${fmt(totalVerse)}</span>
    </div>

    <div style="background:#111;border-radius:14px;padding:14px 16px;margin-bottom:14px">
      <div style="font-size:.62rem;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">Jalons réalistes (12%/an tech · 9% world · 8% PEA)</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:60px">
        ${pts.map((v,i)=>{
          const h=Math.round((v/Math.max(...pts))*100);
          const yr=milestones[i];
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="font-size:.55rem;color:#00e676;font-weight:700">${fk(v)}€</div>
            <div style="width:100%;background:#00e676;border-radius:3px 3px 0 0;height:${h}%;opacity:${0.3+i*0.15}"></div>
            <div style="font-size:.55rem;color:#555">${yr===0?'Auj.':yr+'a'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${results.map(r=>`
    <div class="proj-card ${r.sc.key}">
      <div class="proj-header">
        <span class="proj-label">${r.sc.emoji} ${r.sc.label}</span>
        <span class="proj-total ${r.sc.key}">${fk(r.net)}€ net</span>
      </div>
      <div class="proj-line"><span>Tech CTO (Nasdaq+Semis+AI · ${r.sc.rates.tech}%/an · -30%)</span><span style="color:#ccc"></span></div>
      <div class="proj-line"><span>World CTO (MSCI W+SP500 · ${r.sc.rates.world}%/an · -30%)</span><span style="color:#ccc"></span></div>
      <div class="proj-line"><span>PEA World (${r.sc.rates.pea}%/an · -17,2%)</span><span style="color:#ccc"></span></div>
      <div class="proj-line" style="border-top:1px solid #2a2a2a;margin-top:6px;padding-top:8px">
        <span style="color:#fff;font-weight:600">Gain net total</span>
        <span style="color:${r.sc.color};font-weight:800">+${fk(r.net-totalVerse)}€</span>
      </div>
    </div>`).join('')}

    <div class="info-box green" style="margin-top:4px">5 ETF CTO + PEA inclus · Amundi et Livrets exclus · Données recalculées depuis ton portfolio en temps réel</div>
  `;
}

render();
</script>
</body>
</html>
